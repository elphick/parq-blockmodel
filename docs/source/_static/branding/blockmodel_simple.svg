<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 -10 160 110"
     aria-label="parq-blockmodel icon">

  <!-- colours -->
  <!-- body:      #3A4A56 -->
  <!-- highlight: #F2C14E -->
  <!-- outline:   #1F2A33 -->

  <!-- ================= MAIN SOLID ================= -->

  <!-- top face (2x2) -->
  <polygon points="60,20 100,0 140,20 100,40"
           fill="#3A4A56"/>

  <!-- left face -->
  <polygon points="60,20 100,40 100,70 60,50"
           fill="#3A4A56"/>

  <!-- right face -->
  <polygon points="140,20 100,40 100,70 140,50"
           fill="#3A4A56"/>

  <!-- ================= HIGHLIGHTED BLOCK ================= -->

  <!-- upward-pointing diamond face (foreground block) -->
  <polygon points="100,20 80,30 100,50 120,30"
           fill="#F2C14E"/>

  <!-- front-left face (foreground block) -->
  <polygon points="80,30 100,40 100,70 80,60"
           fill="#F2C14E"/>

  <!-- front-right face (foreground block) -->
  <polygon points="100,40 120,30 120,60 100,70"
           fill="#F2C14E"/>

  <!-- ================= SUBDIVISIONS ================= -->

  <!-- top face splits -->
  <line x1="80"  y1="10" x2="120" y2="30"
        stroke="#1F2A33" stroke-width="2"/>
  <line x1="120" y1="10" x2="80"  y2="30"
        stroke="#1F2A33" stroke-width="2"/>

  <!-- vertical projections -->
  <line x1="80"  y1="30" x2="80"  y2="60"
        stroke="#1F2A33" stroke-width="2"/>
  <line x1="120" y1="30" x2="120" y2="60"
        stroke="#1F2A33" stroke-width="2"/>

  <!-- ================= OUTLINE ================= -->

  <g fill="none"
     stroke="#1F2A33"
     stroke-width="2"
     stroke-linejoin="round">

    <!-- top outline -->
    <polygon points="60,20 100,0 140,20 100,40"/>

    <!-- left outline -->
    <polygon points="60,20 100,40 100,70 60,50"/>

    <!-- right outline -->
    <polygon points="140,20 100,40 100,70 140,50"/>

  </g>

</svg>